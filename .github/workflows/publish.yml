name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Resolve workspace dependencies
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          REACT_VERSION=$(node -p "require('./packages/react/package.json').version")

          cd packages/react
          sed -i "s/\"workspace:\*\"/\"^$CORE_VERSION\"/" package.json

          cd ../native
          sed -i "s/\"@haloform\/core\": \"workspace:\*\"/\"@haloform\/core\": \"^$CORE_VERSION\"/" package.json
          sed -i "s/\"@haloform\/react\": \"workspace:\*\"/\"@haloform\/react\": \"^$REACT_VERSION\"/" package.json

      - name: Publish @haloform/core
        run: npm publish --access public --provenance --no-git-checks
        working-directory: packages/core

      - name: Publish @haloform/react
        run: npm publish --access public --provenance --no-git-checks
        working-directory: packages/react

      - name: Publish @haloform/native
        run: npm publish --access public --provenance --no-git-checks
        working-directory: packages/native
