<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="halo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Halo ring -->
  <ellipse cx="52" cy="36" rx="32" ry="12" stroke="url(#ring-grad)" stroke-width="4" fill="none" opacity="0.9"/>

  <!-- Form icon (document with lines) -->
  <rect x="34" y="32" width="36" height="48" rx="4" fill="url(#halo-grad)" opacity="0.95"/>
  <rect x="42" y="44" width="20" height="3" rx="1.5" fill="#1e1b4b" opacity="0.9"/>
  <rect x="42" y="52" width="14" height="3" rx="1.5" fill="#1e1b4b" opacity="0.7"/>
  <rect x="42" y="60" width="18" height="3" rx="1.5" fill="#1e1b4b" opacity="0.5"/>
  <!-- Checkbox checkmark -->
  <rect x="42" y="68" width="6" height="6" rx="1" fill="#1e1b4b" opacity="0.8"/>
  <path d="M43.5 71.5L45 73L48 69.5" stroke="url(#halo-grad)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text: haloform -->
  <text x="100" y="70" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#e0e7ff" letter-spacing="-1">
    halo<tspan fill="url(#halo-grad)">form</tspan>
  </text>
</svg>
